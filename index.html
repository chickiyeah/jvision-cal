        let calDate = new Date(2026, 2, 1); // 초기값 3월

        function switchView(view) {
            const isList = view === 'list';
            document.getElementById('listView').classList.toggle('hidden', !isList);
            document.getElementById('searchContainer').classList.toggle('hidden', !isList);
            document.getElementById('calView').classList.toggle('hidden', isList);
            
            document.getElementById('viewListBtn').className = isList ? "px-4 py-1.5 rounded-lg text-sm font-bold bg-white shadow-sm text-blue-600" : "px-4 py-1.5 rounded-lg text-sm font-bold text-slate-500";
            document.getElementById('viewCalBtn').className = !isList ? "px-4 py-1.5 rounded-lg text-sm font-bold bg-white shadow-sm text-blue-600" : "px-4 py-1.5 rounded-lg text-sm font-bold text-slate-500";
            if(!isList) renderCalendar();
        }

        // 핵심 업데이트: 카테고리(c)와 제목(t) 모두 검색
        function renderList(filter = "") {
            const listContainer = document.getElementById('listView');
            const f = filter.toLowerCase();
            const filtered = rawData.filter(item => 
                item.t.toLowerCase().includes(f) || item.c.toLowerCase().includes(f)
            );

            listContainer.innerHTML = filtered.map(item => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center hover:ring-2 hover:ring-blue-100 transition-all">
                    <div>
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold ${getCategoryColor(item.c)} mb-2 inline-block">${item.c}</span>
                        <h3 class="text-lg font-bold text-slate-800">${item.t}</h3>
                        <p class="text-slate-400 text-sm font-medium mt-1"><i class="fa-regular fa-clock mr-1"></i> ${item.s}${item.e ? ' ~ ' + item.e : ''}</p>
                    </div>
                    <button onclick="window.open('https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(item.t)}&dates=${item.s.replace(/-/g,'')}/${(item.e||item.s).replace(/-/g,'')}', '_blank')" 
                        class="bg-blue-50 text-blue-600 w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fa-solid fa-plus"></i></button>
                </div>
            `).join('');
        }

        function getCategoryColor(c) {
            switch(c) {
                case '시험': return 'bg-red-50 text-red-500';
                case '수강': return 'bg-emerald-50 text-emerald-600';
                case '휴일': return 'bg-orange-50 text-orange-600';
                case '행사': return 'bg-purple-50 text-purple-600';
                default: return 'bg-slate-100 text-slate-500';
            }
        }

        // 달력 로직 (기존 유지 및 개선)
        function renderCalendar() {
            const year = calDate.getFullYear();
            const month = calDate.getMonth();
            document.getElementById('currentMonthYear').innerText = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const calDays = document.getElementById('calendarDays');
            calDays.innerHTML = "";

            for (let i = 0; i < firstDay; i++) calDays.appendChild(Object.assign(document.createElement('div'), {className: 'day-cell bg-slate-50/30'}));

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayEvents = rawData.filter(item => dateStr >= item.s && dateStr <= (item.e || item.s));
                const div = document.createElement('div');
                div.className = "day-cell p-2 hover:bg-slate-50 transition-colors cursor-pointer border-r border-b";
                div.onclick = () => showDayDetail(dateStr, dayEvents);
                
                let dots = dayEvents.map(e => `<span class="event-dot ${e.c==='시험'?'bg-red-400':e.c==='휴일'?'bg-orange-400':e.c==='행사'?'bg-purple-400':'bg-blue-400'}"></span>`).join('');
                div.innerHTML = `<div class="text-xs font-bold ${new Date(year, month, d).getDay()===0?'text-red-500':''}">${d}</div><div class="mt-1 flex flex-wrap gap-0.5">${dots}</div>`;
                calDays.appendChild(div);
            }
        }

        function showDayDetail(date, events) {
            const detailBox = document.getElementById('dayDetail');
            document.getElementById('detailDate').innerText = `${date} 일정`;
            document.getElementById('detailContent').innerHTML = events.length ? events.map(e => `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-bold text-slate-700">${e.t}</span>
                    <span class="text-[10px] font-black px-2 py-1 rounded-lg ${getCategoryColor(e.c)}">${e.c}</span>
                </div>
            `).join('') : "<p class='text-slate-400 text-sm'>일정이 없습니다.</p>";
            detailBox.classList.remove('hidden');
        }

        function changeMonth(n) { calDate.setMonth(calDate.getMonth() + n); renderCalendar(); }

        document.getElementById('searchInput').addEventListener('input', (e) => renderList(e.target.value));
        window.onload = () => renderList();
